name: Update Price History

on:
  schedule:
    # Once daily at 7am UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'bootstrap (full rebuild) or daily (append)'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - bootstrap

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: history
  cancel-in-progress: true

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate history data
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          node scripts/generate-history.mjs --${MODE}

      - name: Commit history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/history.json
          if git diff --staged --quiet; then
            echo "No history changes"
          else
            git commit -m "chore: update price history $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
